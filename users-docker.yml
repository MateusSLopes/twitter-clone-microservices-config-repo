spring:
  datasource:
    url: jdbc:postgresql://users-db:5432/users_service
    username: ${DB_USER}
    password: ${DB_PASS}
  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration-in-minutes: ${JWT_EXPIRATION}
    refresh-token:
      secret: ${REFRESH_TOKEN_SECRET}
eureka:
  host: discovery
  name: eureka
  port: 8081
